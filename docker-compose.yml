version: '3.8'

services:
  ai-engine:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: incidentmind-ai
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-your_groq_api_key_here}
      - ENVIRONMENT=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: incidentmind-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PYTHON_SERVICE_URL=http://ai-engine:8000
      - MONGODB_URI=mongodb://mongo:27017/incidentmind
    depends_on:
      mongo:
        condition: service_healthy
      ai-engine:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: incidentmind-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    container_name: incidentmind-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
