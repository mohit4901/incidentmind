version: "1.0.0"
name: "incidentmind"
description: "Autonomous SRE agent training environment for infrastructure reliability"
entry_point: "ai/environment/incident_env:IncidentMindEnv"

metadata:
  theme: "Cybersecurity & Infrastructure"
  difficulty: "Advanced"
  tags: ["sre", "kubernetes", "fault-tolerance", "diagnostics"]

environment:
  max_steps: 50
  obs_space: "dict"
  action_space: "discrete/tool_calling"

tools:
  - name: "query_logs"
    description: "Search system logs for errors and patterns"
  - name: "fetch_metric"
    description: "Get real-time time-series data from infrastructure"
  - name: "run_kubectl"
    description: "Inspect cluster state and pod metadata"
  - name: "execute_fix"
    description: "Apply remediation (Restart/Scale/Rollback) to a service"
  - name: "mark_resolved"
    description: "Final action to close the incident episode"

rubrics:
  - name: "diagnostic_accuracy"
    weight: 0.4
    description: "How correctly the agent identified the root cause"
  - name: "resolution_completeness"
    weight: 0.4
    description: "Successful remediation of the fault"
  - name: "operational_efficiency"
    weight: 0.2
    description: "Adherence to SLA and minimization of unnecessary steps"

training:
  framework: "trl-grpo"
  base_model: "Qwen2.5-1.5B"
  accelerator: "MPS/CUDA"
